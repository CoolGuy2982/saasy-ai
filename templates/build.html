<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saasy — Building</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="build-page">

  <!-- Header -->
  <header class="build-header">
    <div class="build-header-left">
      <a href="/dashboard" class="build-back">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <div class="build-header-logo">
        <svg width="18" height="18" viewBox="0 0 28 28" fill="none">
          <rect x="0" y="0" width="13" height="13" rx="2.5" fill="currentColor"/>
          <rect x="15" y="0" width="13" height="13" rx="2.5" fill="currentColor" opacity="0.35"/>
          <rect x="0" y="15" width="13" height="13" rx="2.5" fill="currentColor" opacity="0.35"/>
          <rect x="15" y="15" width="13" height="13" rx="2.5" fill="currentColor"/>
        </svg>
        <span>Saasy</span>
      </div>
      <div class="build-divider"></div>
      <div class="build-title-wrap">
        <span class="build-title" id="build-title">Building your app</span>
      </div>
    </div>
    <div class="build-header-right">
      <div class="build-status" id="build-status">
        <span class="build-status-dot build-status-dot--active"></span>
        <span id="build-status-text">In progress</span>
      </div>
      <button class="build-pause-btn" id="build-pause" aria-label="Pause build">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
        <span>Pause</span>
      </button>
    </div>
  </header>

  <!-- Main build layout -->
  <div class="build-layout">

    <!-- Left: Pipeline + Log -->
    <div class="build-left">

      <!-- Pipeline steps -->
      <div class="pipeline">
        <div class="pipeline-header">
          <span class="pipeline-label">Pipeline</span>
          <span class="pipeline-pct" id="pipeline-pct">0%</span>
        </div>

        <div class="pipeline-track">
          <div class="pipeline-progress" id="pipeline-progress" style="width: 0%"></div>
        </div>

        <div class="pipeline-steps" id="pipeline-steps">
          <!-- Steps injected by JS -->
        </div>
      </div>

      <!-- Activity log -->
      <div class="build-log">
        <div class="build-log-header">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
          <span>Agent log</span>
        </div>
        <div class="build-log-body" id="build-log-body">
          <!-- Log entries injected by JS -->
        </div>
      </div>

    </div>

    <!-- Right: Design Gallery or Browser view -->
    <div class="build-right">

      <!-- View tabs — shown when both gallery and browser are available -->
      <div class="build-view-tabs" id="build-view-tabs" style="display:none;">
        <button class="bvt-btn bvt-btn--active" id="tab-designs">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Designs
        </button>
        <button class="bvt-btn" id="tab-browser">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Browser
        </button>
      </div>

      <!-- Design Gallery — shown during Stitch phase -->
      <div class="design-gallery" id="design-gallery" style="display:none;">
        <div class="design-gallery-header">
          <div class="design-gallery-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>UI Designs</span>
          </div>
          <span class="design-gallery-subtitle" id="design-gallery-subtitle">Generating screens with Google Stitch…</span>
        </div>
        <div class="design-gallery-grid" id="design-gallery-grid">
          <!-- Cards injected by JS -->
        </div>
      </div>

      <!-- Browser pane — shown during browser phases -->
      <div id="browser-pane" style="display:none; width:100%;">
        <!-- Browser chrome -->
        <div class="browser-chrome">
          <div class="browser-bar">
            <div class="browser-dots">
              <span class="dot-red"></span>
              <span class="dot-yellow"></span>
              <span class="dot-green"></span>
            </div>
            <div class="browser-url-wrap">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <span class="browser-url" id="browser-url">about:blank</span>
            </div>
            <div class="browser-bar-actions">
              <div class="browser-spinner" id="browser-spinner"></div>
            </div>
          </div>

        <div class="browser-viewport" id="browser-viewport">
          <div class="browser-placeholder" id="browser-placeholder">
            <div class="browser-placeholder-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
            </div>
            <p>Browser initializing…</p>
            <p class="browser-placeholder-sub">The AI agent will open a browser session here.</p>
          </div>
          <img class="browser-screenshot" id="browser-screenshot" src="" alt="Browser view" />

          <div class="interactive-chat-overlay" id="chat-overlay" style="display: none;">
            <form id="chat-form">
              <input type="text" id="chat-input" placeholder="Message the AI agent to take control…" autocomplete="off">
              <button type="submit" id="chat-submit" title="Send message">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </form>
          </div>

          <!-- Intervention overlay: shown when build needs human sign-in -->
          <div class="intervention-overlay" id="intervention-overlay" style="display: none;">
            <div class="intervention-header">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <span id="intervention-reason">Sign-in required — take control of the browser</span>
            </div>
            <iframe id="intervention-iframe"
              sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
              allow="clipboard-read; clipboard-write"
              src="about:blank"></iframe>
            <div class="intervention-footer">
              <span class="intervention-hint">Sign in, then click Continue when ready.</span>
              <button class="intervention-continue-btn" id="intervention-continue">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                Continue build
              </button>
            </div>
          </div>
        </div>
      </div>

      </div><!-- /browser-pane -->

    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBsPAga9Hd_71js7lKGlvASrY8b-toWa8M",
      authDomain: "saasy-aa123.firebaseapp.com",
      projectId: "saasy-aa123",
      storageBucket: "saasy-aa123.firebasestorage.app",
      messagingSenderId: "421734088338",
      appId: "1:421734088338:web:fc2143d4c765fcad0ef04b"
    };

    initializeApp(firebaseConfig);
    const auth = getAuth();

    // ── Pipeline steps definition ──────────────────────────
    const STEPS = [
      { id: "plan",    label: "Planning",         sub: "Analyzing PRD and defining architecture" },
      { id: "github",  label: "UI Design",          sub: "Generating screens with Google Stitch" },
      { id: "build",   label: "Building app",     sub: "Generating code with Bolt.new" },
      { id: "test",    label: "Testing",           sub: "Running automated checks and QA" },
      { id: "deploy",  label: "Deploying",         sub: "Publishing to Google Cloud Run" },
    ];

    const stepsEl = document.getElementById("pipeline-steps");
    const progressEl = document.getElementById("pipeline-progress");
    const pctEl = document.getElementById("pipeline-pct");
    const logBody = document.getElementById("build-log-body");
    const statusDot = document.querySelector(".build-status-dot");
    const statusText = document.getElementById("build-status-text");
    const browserUrl = document.getElementById("browser-url");
    const browserSpinner = document.getElementById("browser-spinner");
    const browserPlaceholder = document.getElementById("browser-placeholder");
    const browserScreenshot = document.getElementById("browser-screenshot");
    const buildTitle = document.getElementById("build-title");
    const designGallery = document.getElementById("design-gallery");
    const designGalleryGrid = document.getElementById("design-gallery-grid");
    const designGallerySubtitle = document.getElementById("design-gallery-subtitle");
    const browserPane = document.getElementById("browser-pane");
    const buildViewTabs = document.getElementById("build-view-tabs");
    const tabDesigns = document.getElementById("tab-designs");
    const tabBrowser = document.getElementById("tab-browser");

    // Stored design data for modal: name → { html, data }
    const designScreens = {};
    let hasDesigns = false;

    // Read app name from query params
    const params = new URLSearchParams(window.location.search);
    const appName = params.get("name");
    if (appName) buildTitle.textContent = `Building ${appName}`;

    // Render steps
    STEPS.forEach((step, i) => {
      const el = document.createElement("div");
      el.className = "pipeline-step pipeline-step--pending";
      el.id = `step-${step.id}`;
      el.innerHTML = `
        <div class="step-indicator">
          <div class="step-dot">
            <svg class="step-check" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span class="step-num">${i + 1}</span>
          </div>
          ${i < STEPS.length - 1 ? '<div class="step-connector"></div>' : ''}
        </div>
        <div class="step-body">
          <span class="step-label">${step.label}</span>
          <span class="step-sub">${step.sub}</span>
        </div>
        <div class="step-status-badge step-badge--pending">Pending</div>
      `;
      stepsEl.appendChild(el);
    });

    // ── Log helper ─────────────────────────────────────────
    const ICONS = {
      click_at: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>',
      type_text_at: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>',
      navigate: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
      scroll_document: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="7"/><circle cx="12" cy="10" r="2"/></svg>',
      ask: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>',
      user: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
      default: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
    };

    function addLog(text, level = "info") {
      const entry = document.createElement("div");
      
      // Parse Computer Use tool logs
      if (text.startsWith("  → ")) {
        const tool = text.slice(4).trim();
        let icon = ICONS.default, cat = "default", title = "Action";
        if (tool === "click_at") { icon = ICONS.click_at; cat = "click"; title = "Coordinates Clicked"; }
        else if (tool === "type_text_at" || tool === "key_combination") { icon = ICONS.type_text_at; cat = "type"; title = "Typing Details"; }
        else if (tool === "navigate") { icon = ICONS.navigate; cat = "nav"; title = "Page Change"; }
        else if (tool === "scroll_document" || tool === "scroll_at") { icon = ICONS.scroll_document; cat = "scroll"; title = "Scrolled"; }
        
        entry.className = `log-card ${cat}`;
        entry.innerHTML = `<div class="log-card-icon">${icon}</div><div class="log-card-content"><div class="log-card-title">${title}</div><div>${esc(tool)}</div></div>`;
      } 
      else if (level === "thought") {
        entry.className = "log-thought";
        const thoughtText = text.startsWith("💭 ") ? text.slice(3) : text;
        entry.innerHTML = `<div class="log-thought-label">Thinking</div><div class="log-thought-text">${esc(thoughtText)}</div>`;
      }
      else if (level === "agent_ask") {
        entry.className = "log-card ask";
        entry.innerHTML = `<div class="log-card-icon">${ICONS.ask}</div><div class="log-card-content"><div class="log-card-title">Agent Question</div><div>${esc(text)}</div></div>`;
      }
      else if (level === "user_msg") {
        entry.className = "log-card user";
        entry.innerHTML = `<div class="log-card-icon">${ICONS.user}</div><div class="log-card-content"><div class="log-card-title">You</div><div>${esc(text)}</div></div>`;
      }
      else {
        // Standard log format
        const ts = new Date().toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
        entry.className = `log-entry log-entry--${level}`;
        entry.innerHTML = `<span class="log-ts">${ts}</span><span class="log-text">${esc(text)}</span>`;
      }

      logBody.appendChild(entry);
      logBody.scrollTop = logBody.scrollHeight;
    }

    // ── Step state ─────────────────────────────────────────
    function setStep(stepId, state) {
      const el = document.getElementById(`step-${stepId}`);
      if (!el) return;
      el.className = `pipeline-step pipeline-step--${state}`;
      const badge = el.querySelector(".step-status-badge");
      if (badge) {
        badge.className = `step-status-badge step-badge--${state}`;
        badge.textContent = state === "active" ? "Running" : state === "done" ? "Done" : state === "error" ? "Error" : "Pending";
      }
    }

    function setProgress(pct) {
      progressEl.style.width = `${pct}%`;
      pctEl.textContent = `${Math.round(pct)}%`;
    }

    // ── WebSocket stream from /api/ws/build ────────────────
    let ws = null;

    async function startBuild() {
      const prdText = sessionStorage.getItem("saasy_prd") || "";
      if (!prdText && !appName) {
        addLog("No PRD found. Returning to dashboard.", "error");
        setTimeout(() => window.location.href = "/dashboard", 2000);
        return;
      }

      addLog("Connecting to build agent via WebSocket…");

      const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${protocol}//${window.location.host}/api/ws/build`);

      ws.onopen = async () => {
        let token = "";
        try { token = await auth.currentUser?.getIdToken() || ""; } catch {}
        ws.send(JSON.stringify({ prd_text: prdText, app_name: appName, token }));
      };

      ws.onmessage = (event) => {
        let ev;
        try { ev = JSON.parse(event.data); } catch { return; }
        handleEvent(ev);
      };

      ws.onerror = (err) => {
        addLog(`WebSocket error.`, "error");
        statusDot.className = "build-status-dot build-status-dot--error";
        statusText.textContent = "Error";
      };

      ws.onclose = () => {
        if (statusText.textContent !== "Complete") {
          addLog("WebSocket disconnected.", "error");
          statusDot.className = "build-status-dot build-status-dot--error";
          statusText.textContent = "Disconnected";
        }
      };
    }

    function slugify(s) {
      return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function switchView(view) {
      if (view === "designs") {
        designGallery.style.display = "flex";
        browserPane.style.display = "none";
        tabDesigns.classList.add("bvt-btn--active");
        tabBrowser.classList.remove("bvt-btn--active");
      } else {
        designGallery.style.display = "none";
        browserPane.style.display = "block";
        tabDesigns.classList.remove("bvt-btn--active");
        tabBrowser.classList.add("bvt-btn--active");
      }
    }

    function showBrowser() {
      if (hasDesigns) buildViewTabs.style.display = "flex";
      switchView("browser");
    }

    // ── Design preview modal ──────────────────────────────
    function openDesignModal(name) {
      const modal = document.getElementById("design-modal");
      const iframe = document.getElementById("design-modal-iframe");
      document.getElementById("design-modal-name").textContent = name;
      const s = designScreens[name] || {};
      if (s.html) {
        iframe.srcdoc = s.html;
      } else if (s.data) {
        iframe.src = `data:image/png;base64,${s.data}`;
      }
      modal.style.display = "flex";
    }

    function closeDesignModal() {
      document.getElementById("design-modal").style.display = "none";
      const iframe = document.getElementById("design-modal-iframe");
      iframe.srcdoc = ""; iframe.src = "";
    }

    // Apply scale to iframe preview card (call after DOM insertion)
    function applyPreviewScale(card) {
      const preview = card.querySelector(".design-card-preview");
      const scaler  = card.querySelector(".design-card-scaler");
      if (!preview || !scaler) return;
      const w = preview.offsetWidth;
      if (!w) return;
      const scale = w / 1440;
      const h = Math.round(900 * scale);
      preview.style.height = h + "px";
      scaler.style.transform = `scale(${scale})`;
    }

    function handleEvent(ev) {
      switch (ev.type) {
        case "step_start":
          setStep(ev.step, "active");
          setProgress(ev.progress || 0);
          addLog(`Started: ${ev.label}`);
          if (ev.step === "github") {
            // Stitch design phase — show gallery, hide browser
            designGallery.style.display = "flex";
            browserPane.style.display = "none";
            designGallerySubtitle.textContent = "Generating screens with Google Stitch…";
          } else if (["build", "test", "deploy"].includes(ev.step)) {
            // Browser phases — switch to browser view
            showBrowser();
          }
          break;
        case "step_done":
          setStep(ev.step, "done");
          setProgress(ev.progress || 0);
          addLog(`Completed: ${ev.label}`, "success");
          if (ev.step === "github") {
            designGallerySubtitle.textContent = "Designs complete";
          }
          break;
        case "step_error":
          setStep(ev.step, "error");
          addLog(`Error in ${ev.label}: ${ev.message}`, "error");
          statusDot.className = "build-status-dot build-status-dot--error";
          statusText.textContent = "Error";
          break;
        case "log":
          addLog(ev.text, ev.level || "info");
          break;
        case "design_generating": {
          const cardId = `design-card-${slugify(ev.name)}`;
          if (!document.getElementById(cardId)) {
            const skeleton = document.createElement("div");
            skeleton.className = "design-card design-card--skeleton";
            skeleton.id = cardId;
            skeleton.innerHTML = `<div class="design-card-skeleton-img"></div><div class="design-card-label">${esc(ev.name)}</div>`;
            designGalleryGrid.appendChild(skeleton);
          }
          break;
        }
        case "design_screen": {
          hasDesigns = true;
          designScreens[ev.name] = { html: ev.html || "", data: ev.data || "" };

          const cardId = `design-card-${slugify(ev.name)}`;
          let card = document.getElementById(cardId);
          if (!card) {
            card = document.createElement("div");
            card.id = cardId;
            designGalleryGrid.appendChild(card);
          }
          card.className = "design-card";
          card.innerHTML = "";

          // Preview area
          const preview = document.createElement("div");
          preview.className = "design-card-preview";
          preview.addEventListener("click", () => openDesignModal(ev.name));

          if (ev.html) {
            // Iframe preview — scaled to fit card width
            const scaler = document.createElement("div");
            scaler.className = "design-card-scaler";
            const iframe = document.createElement("iframe");
            iframe.style.cssText = "width:1440px;height:900px;border:none;display:block;";
            iframe.scrolling = "no";
            scaler.appendChild(iframe);
            preview.appendChild(scaler);
            card.appendChild(preview);

            // Set srcdoc + scale after layout
            requestAnimationFrame(() => {
              iframe.srcdoc = ev.html;
              applyPreviewScale(card);
            });
          } else if (ev.data) {
            // Fallback: screenshot image (natural size, not squished)
            const img = document.createElement("img");
            img.src = `data:image/png;base64,${ev.data}`;
            img.alt = ev.name;
            img.style.cssText = "width:100%;height:auto;display:block;";
            preview.appendChild(img);
            card.appendChild(preview);
          }

          // Hover overlay
          const overlay = document.createElement("div");
          overlay.className = "design-card-hover-overlay";
          overlay.innerHTML = "<span>Expand</span>";
          preview.appendChild(overlay);

          const label = document.createElement("div");
          label.className = "design-card-label";
          label.textContent = ev.name;
          card.appendChild(label);

          addLog(`Design ready: ${ev.name}`, "success");
          break;
        }
        case "screenshot":
          showBrowser();
          browserPlaceholder.style.display = "none";
          browserScreenshot.style.display = "block";
          document.getElementById("chat-overlay").style.display = "block";
          browserScreenshot.src = `data:image/png;base64,${ev.data}`;
          break;
        case "url":
          browserUrl.textContent = ev.url;
          break;
        case "browser_loading":
          browserSpinner.style.display = ev.loading ? "block" : "none";
          break;
        case "ask_user":
          document.getElementById("chat-input").focus();
          break;
        case "needs_intervention": {
          const overlay = document.getElementById("intervention-overlay");
          const iframe  = document.getElementById("intervention-iframe");
          const reasonEl = document.getElementById("intervention-reason");
          if (ev.reason) reasonEl.textContent = ev.reason;
          if (ev.debugUrl) iframe.src = ev.debugUrl + "?interactive=true";
          overlay.style.display = "flex";
          browserSpinner.style.display = "none";
          statusDot.className = "build-status-dot build-status-dot--paused";
          statusText.textContent = "Waiting for you";
          addLog(`⚠ Intervention needed: ${ev.reason || "sign-in required"}`, "warn");
          break;
        }
        case "intervention_resumed":
          document.getElementById("intervention-overlay").style.display = "none";
          document.getElementById("intervention-iframe").src = "about:blank";
          statusDot.className = "build-status-dot build-status-dot--active";
          statusText.textContent = "Running";
          addLog("Resumed build.", "success");
          break;
        case "done":
        case "ws_done":
          statusDot.className = "build-status-dot build-status-dot--done";
          statusText.textContent = "Complete";
          browserSpinner.style.display = "none";
          setProgress(100);
          addLog("Build complete! Your app is live.", "success");
          if (ev.url || ev.type === "ws_done") {
            addLog(`Deployed at: ${ev.url || browserUrl.textContent}`, "success");
          }
          if (ws) { ws.close(); }
          break;
      }
    }

    let isPaused = false;
    document.getElementById("build-pause").addEventListener("click", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      isPaused = !isPaused;
      if (isPaused) {
        ws.send(JSON.stringify({ type: "pause" }));
        statusDot.className = "build-status-dot build-status-dot--paused";
        statusText.textContent = "Paused";
        document.getElementById("build-pause").textContent = "Resume AI";
      } else {
        ws.send(JSON.stringify({ type: "resume" }));
        statusDot.className = "build-status-dot build-status-dot--active";
        statusText.textContent = "Running";
        document.getElementById("build-pause").textContent = "Pause AI";
      }
    });

    // Remote Click Handler (Translate Image coordinates -> 1440x900 viewport)
    browserScreenshot.addEventListener("click", (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const rect = browserScreenshot.getBoundingClientRect();
      const scaleX = 1440 / rect.width;
      const scaleY = 900 / rect.height;
      const x = Math.round((e.clientX - rect.left) * scaleX);
      const y = Math.round((e.clientY - rect.top) * scaleY);
      ws.send(JSON.stringify({ type: "click", x, y }));
      // Optional: draw a ripple where they clicked
      addLog(`Remote Click sent (${x}, ${y})`, "info");
    });

    // Chat Interface Handler
    document.getElementById("chat-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: "chat", text }));
      input.value = "";
    });

    // Intervention Continue button
    document.getElementById("intervention-continue").addEventListener("click", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: "continue" }));
      document.getElementById("intervention-overlay").style.display = "none";
      document.getElementById("intervention-iframe").src = "about:blank";
      statusDot.className = "build-status-dot build-status-dot--active";
      statusText.textContent = "Running";
      addLog("Resuming build…");
    });

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // Tab clicks
    tabDesigns.addEventListener("click", () => switchView("designs"));
    tabBrowser.addEventListener("click",  () => switchView("browser"));

    // Modal close
    document.getElementById("design-modal-close").addEventListener("click", closeDesignModal);
    document.getElementById("design-modal-overlay").addEventListener("click", closeDesignModal);
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDesignModal(); });

    // Re-apply iframe scales on resize
    window.addEventListener("resize", () => {
      document.querySelectorAll(".design-card").forEach(applyPreviewScale);
    });

    onAuthStateChanged(auth, (u) => {
      if (!u) { window.location.href = "/"; return; }
      startBuild();
    });
  </script>

  <!-- Design preview modal -->
  <div class="design-modal" id="design-modal" style="display:none;">
    <div class="design-modal-overlay" id="design-modal-overlay"></div>
    <div class="design-modal-box">
      <div class="design-modal-header">
        <span class="design-modal-name" id="design-modal-name"></span>
        <button class="design-modal-close" id="design-modal-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <iframe class="design-modal-iframe" id="design-modal-iframe" frameborder="0"></iframe>
    </div>
  </div>

</body>
</html>
