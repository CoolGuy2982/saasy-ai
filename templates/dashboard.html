<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saasy — Dashboard</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="dashboard-page">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark small">
        <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
          <rect x="0" y="0" width="13" height="13" rx="3" fill="currentColor"/>
          <rect x="15" y="0" width="13" height="13" rx="3" fill="currentColor" opacity="0.4"/>
          <rect x="0" y="15" width="13" height="13" rx="3" fill="currentColor" opacity="0.4"/>
          <rect x="15" y="15" width="13" height="13" rx="3" fill="currentColor"/>
        </svg>
      </div>
      <span class="logo-text">Saasy</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Businesses</span>
      </a>
      <a href="#" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span>Launches</span>
      </a>
      <a href="#" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 3h18v18H3z" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>
        </svg>
        <span>Analytics</span>
      </a>
      <a href="#" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <span>Outreach</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div class="user-info" id="user-info">
        <div class="user-avatar" id="user-avatar">—</div>
        <div class="user-details">
          <span class="user-name" id="user-name">Loading…</span>
          <span class="user-email" id="user-email"></span>
        </div>
      </div>
      <button class="btn-sign-out" id="sign-out" aria-label="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main-content">

    <!-- Top bar -->
    <header class="topbar">
      <div>
        <h2 class="page-title">My Businesses</h2>
        <p class="page-sub">All your automated ventures, in one place.</p>
      </div>
      <button class="btn-new" id="new-business-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Business
      </button>
    </header>

    <!-- Empty state / Business grid -->
    <div class="businesses-grid" id="businesses-grid">

      <!-- Empty state shown when no businesses -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="4" y="4" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <rect x="22" y="4" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <rect x="4" y="22" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <rect x="22" y="22" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <h3 class="empty-title">No businesses yet</h3>
        <p class="empty-body">Describe your idea and Saasy builds the rest — the app, the launch, the growth.</p>
        <button class="btn-new" id="empty-new-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Create your first business
        </button>
      </div>

    </div>

  </div>

  <!-- New Business Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true">

      <div class="modal-header">
        <h3 class="modal-title">Where are you starting from?</h3>
        <button class="modal-close" id="modal-close" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Step 1: Choice -->
      <div id="step-choice" class="modal-body">
        <div class="choice-cards">
          <button class="choice-card" id="choice-idea">
            <div class="choice-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M12 2a7 7 0 0 1 7 7c0 2.6-1.4 4.9-3.5 6.2V17a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1v-1.8A7 7 0 0 1 5 9a7 7 0 0 1 7-7z"/>
                <line x1="9" y1="21" x2="15" y2="21"/>
              </svg>
            </div>
            <div class="choice-text">
              <span class="choice-title">I have an idea</span>
              <span class="choice-sub">Let's build from scratch</span>
            </div>
            <svg class="choice-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>

          <button class="choice-card" id="choice-existing">
            <div class="choice-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
              </svg>
            </div>
            <div class="choice-text">
              <span class="choice-title">I already have a business</span>
              <span class="choice-sub">Connect your app and repo</span>
            </div>
            <svg class="choice-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Step 2: Existing business fields -->
      <div id="step-existing" class="modal-body hidden">
        <button class="modal-back" id="modal-back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Back
        </button>

        <label class="field-label" for="repo-input">GitHub repo</label>
        <input id="repo-input" class="repo-input" type="url" placeholder="https://github.com/you/your-repo" />

        <label class="field-label" style="margin-top:16px" for="url-input">Deployed website URL</label>
        <input id="url-input" class="repo-input" type="url" placeholder="https://yourapp.com" />

        <div class="modal-footer" style="padding: 24px 0 0;">
          <button class="btn-cancel" id="modal-cancel">Cancel</button>
          <button class="btn-launch" id="modal-submit">
            <span>Connect</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Firebase + auth guard -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBsPAga9Hd_71js7lKGlvASrY8b-toWa8M",
      authDomain: "saasy-aa123.firebaseapp.com",
      projectId: "saasy-aa123",
      storageBucket: "saasy-aa123.firebasestorage.app",
      messagingSenderId: "421734088338",
      appId: "1:421734088338:web:fc2143d4c765fcad0ef04b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Auth guard
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "/";
        return;
      }
      // Populate UI
      document.getElementById("user-name").textContent = user.displayName || "User";
      document.getElementById("user-email").textContent = user.email;
      const avatar = document.getElementById("user-avatar");
      if (user.photoURL) {
        avatar.innerHTML = `<img src="${user.photoURL}" alt="${user.displayName}" />`;
      } else {
        avatar.textContent = (user.displayName || "U")[0].toUpperCase();
      }
    });

    // Sign out
    document.getElementById("sign-out").addEventListener("click", async () => {
      await fetch("/api/session", { method: "DELETE" });
      await signOut(auth);
      window.location.href = "/";
    });

    // Modal
    const overlay = document.getElementById("modal-overlay");
    const stepChoice = document.getElementById("step-choice");
    const stepExisting = document.getElementById("step-existing");

    const openModal = () => {
      stepChoice.classList.remove("hidden");
      stepExisting.classList.add("hidden");
      overlay.classList.remove("hidden");
    };
    const closeModal = () => overlay.classList.add("hidden");

    document.getElementById("new-business-btn").addEventListener("click", openModal);
    document.getElementById("empty-new-btn").addEventListener("click", openModal);
    document.getElementById("modal-close").addEventListener("click", closeModal);
    document.getElementById("modal-cancel").addEventListener("click", closeModal);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

    // Choice: idea → go straight to chat
    document.getElementById("choice-idea").addEventListener("click", () => {
      window.location.href = "/new";
    });

    // Choice: existing → show fields
    document.getElementById("choice-existing").addEventListener("click", () => {
      stepChoice.classList.add("hidden");
      stepExisting.classList.remove("hidden");
    });

    // Back to choice
    document.getElementById("modal-back").addEventListener("click", () => {
      stepExisting.classList.add("hidden");
      stepChoice.classList.remove("hidden");
    });

    // Submit existing business
    document.getElementById("modal-submit").addEventListener("click", () => {
      const repo = document.getElementById("repo-input").value.trim();
      const url = document.getElementById("url-input").value.trim();
      const params = new URLSearchParams();
      if (repo) params.append("repo", repo);
      if (url) params.append("url", url);
      window.location.href = `/new?${params.toString()}`;
    });

  </script>

</body>
</html>
